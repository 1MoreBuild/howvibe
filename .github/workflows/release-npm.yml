name: Publish npm package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure release tag commit is on main
        run: |
          TAG="${{ github.event.release.tag_name }}"
          git fetch --no-tags origin main

          TAG_SHA="$(git rev-list -n 1 "refs/tags/${TAG}" || true)"
          if [ -z "$TAG_SHA" ]; then
            echo "Cannot resolve tag commit for ${TAG}" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$TAG_SHA" "origin/main"; then
            echo "Release tag ${TAG} is not on main branch history." >&2
            echo "Tag SHA: ${TAG_SHA}" >&2
            exit 1
          fi

      - name: Upgrade npm CLI for trusted publishing
        run: npm install -g npm@latest

      - name: Validate tag matches package version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"

          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag ($TAG) does not match package version ($PKG_VERSION)." >&2
            echo "Expected tag: $EXPECTED_TAG" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish to npm (OIDC)
        run: npm publish --access public
